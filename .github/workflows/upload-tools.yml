# Description:
#   - Running Erda Pipelines on GitHub Actions
# REF:
#   - https://github.com/marketplace/actions/checkout

name: Upload-OSS-Assets
on:
  push:
    branches:
      - develop
      - feature/oss
  # This schedule will run only from the default branch
  schedule:
    - cron: '15 0 * * *' # run at 00:15 AM UTC

jobs:
  Upload-Assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
        with:
          repository: hustcer/termix-nu
          token: ${{ secrets.GH_PAT }}  # `GH_PAT` is a secret that contains your PAT

      - name: Setup Nu
        uses: hustcer/setup-nu@v3.8
        with:
          version: 0.89.0

      - name: Handle Upload
        shell: nu {0}
        run: |
          use ${{ github.workspace }}/actions/oss-upload.nu *

          let ak = '${{ secrets.OSS_AK }}'
          let sk = '${{ secrets.OSS_SK }}'
          let endpoint = '${{ vars.OSS_ENDPOINT }}'
          setup-oss-util --ak-id $ak --ak-secret $sk --endpoint $endpoint
          oss-assets-upload just --bucket ${{ vars.OSS_BUCKET }}
          oss-assets-upload nushell --bucket ${{ vars.OSS_BUCKET }}


