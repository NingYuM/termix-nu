name: Build and Push Termix-Nu Image

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
    branches:
      - master
      - develop
    paths:
      - Dockerfile
      - .github/workflows/build-image.yaml
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker Tag'

jobs:
  build-and-push-termix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Number of commits to fetch. 0 indicates all history for all branches and tags.
          fetch-depth: 0

      - name: Setup Nushell
        uses: hustcer/setup-nu@v3
        with:
          check-latest: true

      - name: Set Docker Image Tag
        id: set-tag
        shell: nu {0}
        run: |
          let inputTag = '${{ inputs.tag }}'
          if ($inputTag | is-not-empty) {
            echo $"IMAGE_TAG=($inputTag)\n" o>> $env.GITHUB_OUTPUT
            return
          }
          if ('${{ github.ref }}' =~ 'refs/tags/') {
            let tag = '${{ github.ref }}' | str replace refs/tags/v '' | str replace -r '.0$' ''
            echo $"IMAGE_TAG=($tag)\n" o>> $env.GITHUB_OUTPUT
            return
          }
          let tag = match ${{ github.ref }} {
            'refs/heads/master' => 'latest',
            'refs/heads/develop' => 'bleeding',
            _ => 'bleeding'
          }
          echo $"IMAGE_TAG=($tag)\n" o>> $env.GITHUB_OUTPUT

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Erda Registry
        uses: docker/login-action@v3
        with:
          registry: erda-registry.cn-hangzhou.cr.aliyuncs.com
          password: ${{ secrets.ERDA_REGISTRY_TOKEN }}
          username: ${{ secrets.ERDA_REGISTRY_USERNAME }}

      - name: Build Alpine Test Image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          push: false
          load: true
          context: .
          file: ./Dockerfile
          tags: termix-test-image

      - name: Test Alpine Image
        run: |
          echo "## Alpine Container Test Results" >> $GITHUB_STEP_SUMMARY
          docker run --rm \
            -v "$(pwd):/work" \
            --env GITHUB_ACTIONS=${{ env.GITHUB_ACTIONS }} \
            termix-test-image nu /work/tests/test-docker.nu \
            >> $GITHUB_STEP_SUMMARY

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            erda-registry.cn-hangzhou.cr.aliyuncs.com/terp/termix:${{ steps.set-tag.outputs.IMAGE_TAG }}

