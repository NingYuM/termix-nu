name: Build and Push termix-nu Image

on:
  push:
    branches:
      - master
      - develop
    paths:
      - Dockerfile
      - .github/workflows/build-image.yaml
  workflow_dispatch:

jobs:
  build-and-push-termix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Erda Registry
        uses: docker/login-action@v3
        with:
          registry: erda-registry.cn-hangzhou.cr.aliyuncs.com
          password: ${{ secrets.ERDA_REGISTRY_TOKEN }}
          username: ${{ secrets.ERDA_REGISTRY_USERNAME }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            erda-registry.cn-hangzhou.cr.aliyuncs.com/terp/termix:latest

