version: "1.1"
name: "termix-nu"
stages:
  - stage:
    - git-checkout:
        version: "1.0"
        alias: git-checkout
        description: Checkout Code
        params:
          depth: 1
        timeout: 3600
  - stage:
    - release:
        alias: release
        description: Build release image for Erda
        params:
          dice_yml: ${git-checkout}/erda.yml

  - stage:
    - dice:
        alias: dice
        version: "1.0"
        description: Deploy to Erda
        params:
          time_out: 1800
          release_id: ${release:OUTPUT:releaseID}
