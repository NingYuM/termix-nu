# TOML Reference: https://toml.io/en/v1.0.0

# 注意事项：
#   1. 尽量使用内联表，除非导致文本行宽度过宽，此时可采用标准表;
#   2. JSON -> TOML: brew install yj && cat package.json | yj -jt;
#      TOML -> JSON: cat redevelop.b2c.toml | yj -tj -i;
#   3. VS Code 插件推荐: Even Better TOML;

# Termix-nu version
version = 'v1.91.0'

# Min nushell version required to run termix-nu commands
minNuVer = '0.106.0'

# Min just version required to run termix-nu commands
minJustVer = '1.39.0'

# Min @terminus/t-package-tools version required to sync terp assets
minPkgToolVer = '0.5.5'

# 新增的二开标签备注
redevTagComment = 'This is a release tag'

# .termixrc 配置从哪个分支上读取？`_current_` 代表当前所在 git 分支, `i` 表示全局 i 分支
useConfFromBranch = 'i'

