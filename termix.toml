[empWorkingHour]
leaveUrl = 'https://emp-portal.app.terminus.io/api/trantor/service/engine/execute/MD$get_employee_leave_info'
timeUrl = 'https://emp-portal.app.terminus.io/api/trantor/service/engine/execute/WORKTIME$get_employee_project_hours_within_specified_time'
staffUrl = 'https://emp-portal.app.terminus.io/api/trantor/service/engine/execute/WORKTIME$get_department_employees_with_work_hour_filter'
timeSummaryUrl = 'https://emp-portal.app.terminus.io/api/trantor/service/engine/execute/WORKTIME$department_employees_work_hours_data_status_statis'
allStaffUrl = 'https://emp-portal.app.terminus.io/api/trantor/service/engine/execute/PROJECT$SYS_PagingDataService?tmodule=&modelKey=MD%24md__staff_b_o'

# 快捷导航
[quickNavs]
nusi-slim = 'https://nusi-slim.app.terminus.io/'
nusi-flex = 'https://nusi-flex.app.terminus.io/'
termix-nu = 'https://fe-docs.app.terminus.io/termix/termix-nu'

# Set currentSelected to change the shell to execute the command
# 'SHELL_TO_RUN_CMD' var in .env has higher priority
[shellToRunCmd]
nu = '-c'
sh = '-c'
cmd = '/c'
zsh = '-uc'
fish = '-c'
node = '-e'
bash = '-uc'
python3 = '-c'
powershell = '-c'
currentSelected = 'bash'
