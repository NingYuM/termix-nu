# Created at: 2023/09/18 17:30:00
# Description: Rio Terminal Configuration
# Install Rio: brew install rio --cask
# Adapt config file to v0.0.33
# REF: https://raphamorim.io/rio/docs/configuration-file/

# Theme
#
# It makes Rio look for the specified theme in the themes folder
# (macos and linux: ~/.config/rio/themes/dracula.toml)
# (windows: C:\Users\USER\AppData\Local\rio\themes\dracula.toml)
#
# Dracula theme code is available in:
# https://github.com/dracula/rio-terminal
# All available themes are available in: https://github.com/raphamorim/rio-terminal-themes/tree/main/themes
# Favorite themes: dracula,Calamity
theme = "Calamity"

# Ignore theme selection foreground color
#
# Default is false
#
ignore_theme_selection_fg_color = false

# Adaptive Theme
#
# Changes theme based on the system theme (light and dark)
# Only works for Web, MacOS and Windows
# This configuration is disabled by default
#
# [adaptive-theme]
# light = "Belafonte Day"
# dark = "Belafonte Night"

# Padding-x
#
# define x axis padding (default is 10)
#
padding-x = 8

# Option as Alt
#
# This config only works on MacOs.
# Possible choices: 'both', 'left' and 'right'.
#
option-as-alt = 'both'

[cursor]
# Cursor
#
# By default, the cursor shape is set to `block`.
# You can also choose from other options like `underline` and `beam`.
shape = 'beam'

# Blinking Cursor
#
# Default is false
#
blinking = false

# Performance
#
# Set WGPU rendering performance
# High: Adapter that has the highest performance. This is often a discrete GPU.
# Low: Adapter that uses the least possible power. This is often an integrated GPU.
#
[renderer]
performance = "High"
# backend options:
# Automatic: Leave Sugarloaf/WGPU to decide
# GL: Supported on Linux/Android, and Windows and macOS/iOS via ANGLE
# Vulkan: Supported on Windows, Linux/Android
# DX12: Supported on Windows 10
# DX11: Supported on Windows 7+
# Metal: Supported on macOS/iOS
backend = "Automatic"
disable-renderer-when-unfocused = false

# Window configuration
#
# • width - define the initial window width.
#   Default: 600
#
# • height - define the initial window height.
#   Default: 400
#
# • opacity - changes the window transparency state (only Windows / X11)
#   Default: 1.0
#
# • mode - define how the window will be created
#     - "Windowed" (default) is based on width and height
#     - "Maximized" window is created with maximized
#     - "Fullscreen" window is created with fullscreen
#
[window]
width = 1000
height = 600
blur = true
opacity = 0.9
background-opacity = 0.5
mode = "Windowed"
# window.decorations available options are Enabled, Disabled, Transparent and Buttonless.
decorations = "Buttonless"
macos-hide-window-buttons = false

[window.background-image]
# path = "/Users/hustcer/Pictures/wallpapers/MI01011728_3200_wallpaper_des.jpg"
opacity = 0.1

[scroll]
multiplier = 3.0
divider = 1.0

[keyboard]
use-kitty-keyboard-protocol = false
disable-ctlseqs-alt = false

# Fonts
#
# Configure fonts used by the terminal
#
# Note: You can set different font families but Rio terminal
# will always look for regular font bounds whene
#
# Another Note: "cascadiamono" font is built-in.
#
[fonts]
size = 20
extras = [
  { family = "Lilex", style = "Normal" },
  { family = "Sarasa Term SC", style = "Normal" },
  { family = "PingFang SC", style = "Normal" },
]

# # You can also set family on root to overwrite all fonts
# family = "cascadiamono"

[fonts.regular]
family = "Fira Code"
style = "Normal"
weight = 400

[fonts.bold]
family = "Fira Code"
style = "Normal"
weight = 800

[fonts.italic]
family = "Fira Code"
style = "Italic"
weight = 400

[fonts.bold-italic]
family = "Fira Code"
style = "Italic"
weight = 800

# Navigation
#
# "mode" - Define navigation mode
#   - NativeTab (MacOs only)
#   - Bookmark
#   - BottomTab
#   - TopTab
#   - Breadcrumb
#   - Plain
#
# "clickable" - Enable click on tabs to switch.
# "use-current-path" - Use same path whenever a new tab is created.
# "color-automation" - Set a specific color for the tab whenever a specific program is running.
#
[navigation]
mode = "Bookmark"
clickable = true
use-current-path = true
color-automation = [
  { program = "nu", color = "#5EA602" },
  { program = "nvim", color = "#FFFF00" },
]

# Shell
#
# You can set `shell.program` to the path of your favorite shell, e.g. `/bin/fish`.
# Entries in `shell.args` are passed unmodified as arguments to the shell.
#
# Default:
#   - (macOS) user login shell
#   - (Linux/BSD) user login shell
#   - (Windows) powershell
#
shell = { program = "/bin/zsh", args = ["--login"] }

# Use fork
#
# Defaults for POSIX-based systems (Windows is not configurable):
# MacOS: spawn processes
# Linux/BSD: fork processes
#
use-fork = false

# Colors
#
# Colors definition will overwrite any property in theme
# (considering if theme folder does exists and is being used)
#
# [colors]
# background = "#BBBD64"
# foreground = "#040400"
# cursor = "#242805"
# tabs-active = "#F8A145"
# blue = "#454A12"


# Bindings
#
# Create custom Key bindings for Rio terminal
# More information in: raphamorim.io/rio/docs/custom-key-bindings
#
[bindings]
keys = [
  { key = "q", with = "super", action = "Quit" },
  # Bytes[27, 91, 53, 126] is equivalent to "\x1b[5~"
  { key = "home", with = "super | shift", bytes = [27, 91, 53, 126] },
  { key = "right", with = "super", action = "SelectNextTab" },
  { key = "left", with = "super", action = "SelectPrevTab" },
  # OR: Command + Ctrl + F
  { key = "return", with = "super", action = "ToggleFullscreen" },
  { key = "n", with = "super | shift", action = "CreateTab" },
  { key = "w", with = "super | shift", action = "CreateWindow" },
  { key = "v", with = "super | shift | control", action = "SplitVertically" },
  { key = "h", with = "super | shift | control", action = "SplitHorizontally" },
]

[developer]
# Log level
#
# This property enables log level filter. Default is "OFF".
#
log-level = "INFO"
